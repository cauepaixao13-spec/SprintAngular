<div class="home-page">
  <nav class="navbar home-navbar px-4">
    <span class="navbar-brand d-flex align-items-center gap-2">
      <img src="/img/ford.png" alt="Ford" class="home-navbar__logo">
      <span class="fw-semibold">Ford Dashboard</span>
    </span>

    <button type="button" class="btn btn-outline-light btn-sm logout-btn" (click)="logout()">
      <i class="bi bi-box-arrow-right me-1"></i> Sair
    </button>
  </nav>

  <div class="home-hero">
    <div class="home-hero__overlay"></div>

    <div class="welcome-card animate-fade-in">
      <p class="welcome-card__eyebrow">Olá, {{ userName }} 👋</p>
      <h1 class="welcome-card__title">Bem-vindo ao seu painel Ford</h1>
      <strong>
        <p class="welcome-card__text">
          Acompanhe vendas, conectividade e atualizações de software da frota
          em tempo real em um único lugar.
        </p> 
      </strong>

      <button type="button" class="btn btn-dashboard-link" (click)="goToDashboard()">
        Acessar Dashboard
        <i class="bi bi-arrow-right-circle-fill ms-2"></i>
      </button>
    </div>
  </div>
</div>
