<div class="login-page">
  <div class="login-page__overlay"></div>

  <div class="login-card animate-fade-in">
    <div class="login-card__brand">
      <img src="/img/ford.png" alt="Ford" class="login-card__logo">
      <p class="login-card__subtitle">Dashboard Corporativo</p>
    </div>

    <h1 class="login-card__title">Bem-vindo de volta</h1>
    <p class="login-card__hint">Acesse sua conta para continuar</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form" novalidate>

      <div class="form-floating mb-3">
        <input
          type="text"
          class="form-control"
          id="username"
          name="username"
          placeholder="Usuário"
          [(ngModel)]="credentials.username"
          required
          autocomplete="username"
        >
        <label for="username">Usuário</label>
      </div>

      <div class="form-floating mb-3">
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          placeholder="Senha"
          [(ngModel)]="credentials.password"
          required
          autocomplete="current-password"
        >
        <label for="password">Senha</label>
      </div>

      <div class="alert alert-danger py-2 animate-fade-in" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-login w-100"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Entrar</span>
        <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      </button>

    
    </form>
  </div>
</div>
